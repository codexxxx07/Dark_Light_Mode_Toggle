<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch the Universe</title>
    <link rel="stylesheet" href="dist/output.css">
</head>
<body class="transition-all duration-700 ease-in-out bg-gradient-to-b from-sky-300 via-sky-200 to-yellow-100 dark:from-slate-900 dark:via-indigo-950 dark:to-black min-h-screen">
    <div id="stars-container" class="fixed inset-0 pointer-events-none"></div>
    
    <div class="min-h-screen flex flex-col">
        <div class="flex-1 flex items-center justify-center p-8">
            <div class="floating text-center">
                <h1 class="text-4xl md:text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 to-orange-500 dark:from-purple-400 dark:to-blue-400 mb-4">
                    Switch the Universe ✨
                </h1>
                <p class="text-lg md:text-xl text-slate-700 dark:text-slate-300 mb-12">
                    <span id="mode-text">☀️ Bright & Cheerful Day</span>
                </p>
                
                <div id="toggle-container" class="relative w-48 h-48 mx-auto cursor-pointer select-none">
                    <div id="track" class="absolute inset-0 rounded-full bg-gradient-to-r from-blue-200 to-yellow-200 dark:from-slate-800 dark:to-indigo-800 transition-all duration-700 ease-in-out shadow-2xl">
                        <div id="sun-moon" class="absolute top-4 left-4 w-40 h-40 rounded-full bg-gradient-to-br from-yellow-300 to-orange-400 dark:from-slate-200 dark:to-slate-400 transition-all duration-700 ease-in-out shadow-lg flex items-center justify-center">
                            <div id="sun-rays" class="absolute inset-0 rounded-full rotating">
                                <div class="absolute -top-2 left-1/2 -translate-x-1/2 w-2 h-6 bg-yellow-400 rounded-full"></div>
                                <div class="absolute top-1/2 -right-2 -translate-y-1/2 w-6 h-2 bg-yellow-400 rounded-full"></div>
                                <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-2 h-6 bg-yellow-400 rounded-full"></div>
                                <div class="absolute top-1/2 -left-2 -translate-y-1/2 w-6 h-2 bg-yellow-400 rounded-full"></div>
                                <div class="absolute top-3 right-3 rotate-45 w-2 h-5 bg-yellow-400 rounded-full"></div>
                                <div class="absolute bottom-3 right-3 -rotate-45 w-2 h-5 bg-yellow-400 rounded-full"></div>
                                <div class="absolute top-3 left-3 -rotate-45 w-2 h-5 bg-yellow-400 rounded-full"></div>
                                <div class="absolute bottom-3 left-3 rotate-45 w-2 h-5 bg-yellow-400 rounded-full"></div>
                            </div>
                            
                            <div id="moon-craters" class="absolute inset-0 opacity-0 dark:opacity-100 transition-opacity duration-700">
                                <div class="absolute top-10 left-10 w-8 h-8 bg-slate-300 rounded-full opacity-50"></div>
                                <div class="absolute top-20 right-12 w-6 h-6 bg-slate-300 rounded-full opacity-40"></div>
                                <div class="absolute bottom-12 left-16 w-5 h-5 bg-slate-300 rounded-full opacity-60"></div>
                            </div>
                        </div>
                        
                        <div class="absolute inset-0 rounded-full border-8 border-white/30 dark:border-slate-600/30 transition-colors duration-700"></div>
                    </div>
                    
                    <div id="moon-glow" class="absolute inset-0 rounded-full bg-purple-400/30 blur-2xl opacity-0 dark:opacity-100 transition-opacity duration-700 scale-75"></div>
                </div>
                
                <p class="mt-12 text-slate-500 dark:text-slate-400 text-sm">
                    Click the sphere to change time !!!
                </p>
            </div>
        </div>
        <footer class="text-center py-6 border-t border-slate-300/30 dark:border-slate-700/30 transition-colors duration-700">
            <p class="text-slate-600/70 dark:text-slate-400/70 text-sm transition-colors duration-300 hover:text-slate-700 dark:hover:text-slate-300">
                © 2026 Krish | Built with ❤️ and Code | All Rights Reserved
            </p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
